<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vibedentify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<!-- vibes side panel -->
<div id="vibe-panel">
  <div class="sib-hd">
    <h2>Vibes</h2>
    <button class="sib-close" id="vibe-close">close ✕</button>
  </div>
  <div class="sib-body" id="vibe-body"></div>
</div>
<!-- sibling editor panel -->
<div id="sib-panel">
  <div class="sib-hd">
    <h2>Sibling Groups</h2>
    <button class="sib-close" id="sib-close">close ✕</button>
  </div>
  <div class="sib-body" id="sib-body"></div>
</div>
<!-- likely-misread review panel -->
<div id="flag-panel">
  <div class="sib-hd">
    <h2>Review reads</h2>
    <button class="sib-close" id="flag-close">close ✕</button>
  </div>
  <div class="sib-body" id="flag-body"></div>
</div>

<header>
  <!-- animated EQ bars signature element -->
  <div class="eq-bars" id="eq-bars"></div>
  <div class="hd-left">
    <h1>Vibe<em>dentify</em></h1>
    <span class="sub">Scan and Sort!</span>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="list" type="button">&#8801; List</button>
    <button class="tab" data-view="map" type="button">&#10038; Map</button>
    <button class="tab" data-view="guide" type="button">&#9432; Guide</button>
  </nav>
  <div class="lensbar">
    <span class="lblab">identity</span>
    <select id="g-identity" title="overall genre read (side breakdown)">
      <option value="v2">v2 · salience</option>
      <option value="v1">v1 · flat %</option>
    </select>
    <span class="lblab">segmentation</span>
    <select id="g-seg" title="waveform genre stream">
      <option value="raw">raw</option>
      <option value="hysteresis" selected>hysteresis</option>
      <option value="sibling">sibling-merge</option>
      <option value="family">family (PulseRoots)</option>
      <option value="hyst+sib">hyst + sibling</option>
    </select>
    <button id="sib-btn" class="sib-btn" type="button" title="edit sibling-merge groups">siblings &#9881;</button>
  </div>
</header>

<!-- ONE big drop-anywhere window; the list lives inside it -->
<main id="drop" tabindex="0" aria-label="Drop audio files anywhere in this window">
  <div class="listhead"><span>Track</span><span>BPM / Key</span><span>Genre</span></div>
  <div id="rows">
    <div id="empty">
      <div class="big">Drop tracks here</div>
      <div class="hint">Drag any number of audio files anywhere in this window,<br>
        or use <b>Browse</b> below. MP3, FLAC, WAV, M4A, OGG, AIFF &amp; more.</div>
    </div>
  </div>
</main>

<!-- interactive genre constellation of the whole library -->
<section id="map-view" hidden aria-label="Genre map">
  <div class="map-top">
    <div class="map-search-wrap">
      <input id="map-search" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search a track, artist, or genre&hellip;">
      <div id="map-suggest" hidden></div>
    </div>
    <div class="map-mode" id="map-mode" title="layout: genre regions vs. pure sonic similarity">
      <button class="mm active" data-mode="regions" type="button">&#9678; regions</button>
      <button class="mm" data-mode="galaxy" type="button">&#10022; galaxy</button>
    </div>
    <button id="map-harmonic" class="map-toggle" type="button" title="harmonic mixing: with a track selected, highlight key + BPM compatible tracks">&#127911;</button>
    <button id="map-edges" class="map-toggle on" type="button" title="show / hide the connection lines">&#8776;</button>
    <select id="map-filter" class="map-filter" title="show only one genre (or just the flagged reads)">
      <option value="">all genres</option>
    </select>
    <label class="map-spin-wrap" title="orbit speed (drag to 0 to stop)">&#8635;
      <input type="range" id="map-spin" min="0" max="100" value="37">
    </label>
    <span class="map-hint" id="map-count">loading&hellip;</span>
    <span class="spacer"></span>
    <button id="map-reset" type="button" title="reset view">&#9737; fit</button>
  </div>
  <div id="map-stage">
    <canvas id="map-canvas"></canvas>
    <div id="map-legend"></div>
    <div id="map-tip" hidden></div>
    <div id="map-pop" hidden></div>
  </div>
</section>

<!-- user guide (rendered from docs/USAGE.md) -->
<section id="guide-view">
  <article id="guide-body" class="guide-body">Loading&hellip;</article>
</section>

<!-- bottom action bar -->
<footer class="actionbar">
  <label class="browse" for="picker">⊕ Browse files&hellip;</label>
  <button id="batch-btn" type="button">⊕ batch folder</button>
  <button id="vibe-btn" type="button">◈ vibes</button>
  <button id="flag-btn" type="button" title="find likely-misread genres in your library">⚠ review reads</button>
  <span id="batch-status"></span>
  <span class="spacer"></span>
  <span id="count">0 tracks</span>
  <button id="clear" type="button">Clear list</button>
  <button id="export" type="button" disabled>Export .txt</button>
  <input id="picker" type="file" multiple
    accept=".mp3,.flac,.m4a,.mp4,.aac,.alac,.ogg,.oga,.opus,.wav,.aif,.aiff,.aifc,.wma,.wv,.ape,.mpc,.dsf,audio/*">
</footer>

<script src="/static/app.js"></script>
</body>
</html>

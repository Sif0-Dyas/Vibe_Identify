name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # essentia-tensorflow is intentionally omitted here: it is imported
        # lazily inside functions and the test suite runs in FAKE_ANALYZER mode,
        # so the models are never loaded. Installing it (large, niche wheels)
        # would only slow CI down without exercising any extra code path.
        run: pip install flask mutagen numpy pytest pytest-cov ruff bandit pip-audit

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Security scan (bandit)
        # SAST for the Python source. Known false-positives (fake-mode RNG seeds,
        # the hardcoded-HTTPS model download, best-effort try/except around BPM/key)
        # are triaged with inline `# nosec <id>` justifications, so a clean run is
        # zero findings and any NEW finding fails the build.
        run: bandit -r vibedentify/ -q

      - name: Dependency audit (pip-audit)
        # Audit the pinned runtime deps for known CVEs. essentia-tensorflow is
        # filtered out for the same reason it's omitted from the install above:
        # its niche pre-release wheel can't be resolved by pip-audit's sandbox,
        # and it has no CVE history. Everything else (flask/mutagen/numpy) is
        # audited, so a future advisory on those fails the build.
        run: |
          grep -v essentia requirements.txt > /tmp/req-audit.txt
          pip-audit -r /tmp/req-audit.txt --no-deps

      - name: Lint JS (eslint)
        # Static check for the split frontend (app.js / player.js / map.js share
        # one global scope). no-undef catches the split's failure mode: a function
        # moved to one file but still called from another (a cross-file
        # ReferenceError no Python check would see).
        run: |
          npm ci
          npx eslint vibedentify/static/

      - name: Test (pytest + coverage floor)
        # FAKE_ANALYZER keeps the model/inference path out of CI; the 50% floor
        # is set below full coverage on purpose, since analysis.py's real-analysis
        # path legitimately can't run here.
        env:
          FAKE_ANALYZER: "1"
        run: pytest -q --cov=vibedentify --cov-fail-under=50
